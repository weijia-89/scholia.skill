  - exercise_name: Anxious-Avoidant Trap Check
    steps:
      - Note activation spike — rapid merge feeling or hot-cold mixed signals (Levine Ch4 Tamara/Greg + Ch8 workshop cases).
      - Check pool skew — dating pools may over-represent avoidant patterns; activation ≠ proof of fit (pillar P-N).
      - Ask whether needs for closeness and space are mutually workable — not whether intensity equals passion (Levine Ch8).
      - If protest — pause before escalation; if mismatch — adjust investment rather than pursue (pillar P-P σ−).
    cognitive_frame: High activation with mixed signals is data about fit, not a mandate to try harder.
    observables:
      - Operator logs hot-cold episodes before increasing investment
      - Avoids interpreting withdrawal as a puzzle to solve with more contact
    contraindications:
      - double-text escalation after slow reply
      - performing avoidant distance to regain control
    source_anchor: C-B08_CH04-001 · r02-foundational-guidance-pillars.md P-N
    aletheia_wire: references/model/operator-self-module.md#attach-map
    operator_fit_tags: [partner-read, dating-IRL]
    quality_level: full

  - exercise_name: Secure Match Runway Protocol
    steps:
      - Spot secure early markers — direct asks, consistent follow-through, tolerates closeness and space (pillar P-O + Levine Ch8 Bella/Logan).
      - Communicate needs early — secure partners respond to directness without devaluation (Levine Ch8 secure screening).
      - Give runway — avoid anxious game-playing or premature merge when secure pace is steady (Levine Janet workshop contrast).
      - Maintain abundance mindset — one match is not the only potential partner (Levine secure early screening).
    cognitive_frame: Needs-first framing — give secure matches room to meet you directly rather than testing them.
    observables:
      - Operator states preferences without preemptive apology
      - Accepts steady pacing without protest behaviors
    contraindications:
      - testing secure partner with indirect games
      - staying in bad match to avoid re-entering pool (safety move)
