cards:
  - exercise_name: Golden Rules for Deciphering Attachment Style
    steps:
      - Ask — does this person seek intimacy and closeness consistently? (Golden Rule 1, Levine Ch8).
      - Ask — are they highly sensitive to rejection or slights? (Golden Rule 2).
      - Look for patterns across episodes — one symptom is insufficient (Golden Rule 3).
      - Observe reaction to effective communication — secure engages; avoidant deflects or labels neediness (Golden Rule 4 + smoking guns).
      - Listen for omissions — what they avoid saying may signal avoidant strategy (Golden Rule 5).
    cognitive_frame: Protest behavior is biology plus attachment system — name it internally; no chase scripts (C-B08_CH09-001 σ−).
    observables:
      - Operator pauses before double-text when spike follows slow reply
      - Distinguishes protest activation from genuine mismatch
      - Uses direct needs language with secure matches
    contraindications:
      - protest persistence or chase escalation (σ−)
      - anxious-avoidant trap mistaken for chemistry without pattern check
    source_anchor: C-B08_CH08-002 · levine_2010_attached_ch08_chapter_ingest.md
