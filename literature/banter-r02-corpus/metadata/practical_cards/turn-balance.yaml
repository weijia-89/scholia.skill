cards:
  - exercise_name: Effective Listening Strategies Practice
    steps:
      - Before replying, notice listening blocks — rehearsing answer, filtering, advising, judging (Antony Ch10 / McKay listening blocks).
      - Ask about her content — one question at a time; match her pace (pillar P-Z + C-G006-A03 online rule).
      - Give a brief answer when your turn comes — then ask again rather than monologue (C-005/C-006 turn balance).
      - Monitor closed body language — self-monitor and open channels (Antony Ch10 closed-behavior self-monitoring).
    cognitive_frame: Balanced turns and matched disclosure predict rapport — responsiveness beats question stacks (MANIP-QSTACK WARN).
    observables:
      - Alternating ask–answer in early rapport online
      - Operator catches self rehearsing reply instead of listening
      - Fewer rapid-fire personal questions without reciprocity
    contraindications:
      - MANIP-QSTACK rapid-fire interrogation
      - using follow-up questions as persistence after disengagement
    source_anchor: C-G006-A03 · antony_2017_shyness_sa_workbook_ch13_chapter_ingest.md
    aletheia_wire: references/model/operator-self-module.md#turn-balance
