    quality_level: full

  - exercise_name: Responsiveness Check-In
    steps:
      - After you share, note whether she reciprocates disclosure depth — matched depth when trust exists (C-009 reciprocity).
      - If she gives short replies — adjust pace down; one affiliative question rather than stack (FI-C-009 disputed cap 60).
      - If mutual engagement present — continue balanced turns; do not escalate intensity faster than reciprocity (A05 hyperpersonal WARN).
      - Log turn balance quality for debrief — not as score to manipulate outcome.
    cognitive_frame: Responsiveness is mutual engine of liking — read her pace, don't engineer compliance.
    observables:
      - Operator adjusts question rate to her reply length
      - Disclosure depth rises gradually with reciprocity
    contraindications:
      - trauma-dump to force reciprocal share (MANIP-VULNBAIT)
      - binary ultimatums on response speed (MANIP-BINARY)
