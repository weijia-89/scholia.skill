cards:
  - exercise_name: DAY 1 — Phrases to Buy Time
    steps:
      - When asked for a favor or date commitment — insert delay before any yes (Braiker DAY 1 Five-Step Response Sequence).
      - Use buy-time phrases — hold/excuse without committing (Braiker Phrases_to_Buy_Time hook).
      - Rehearse phrases out loud to build assertive tone without aggression or over-apology (Braiker Ch18).
      - Break automatic yes habit — delay between request and response (Braiker DAY 1 finding).
    cognitive_frame: Approval trap breaks when operator inserts pause — time to consult own preference before pleasing.
    observables:
      - Visible pause before agreeing to plans
      - Operator uses buy-time phrase instead of instant yes
    contraindications:
      - buy-time used to string someone along without eventual clarity
      - persistence-after-no after they accept your no
    source_anchor: C-EXTB03_CH18-001 · braiker_2000_disease_to_please_ch18_chapter_ingest.md
