  - exercise_name: DAY 2 — Broken Record Technique
    steps:
      - Acknowledge pressure or guilt-trip without capitulating (Braiker DAY 2 Broken Record).
      - Calmly repeat boundary message — firm and pleasant tone (Braiker Ch19 finding).
      - Do not over-explain or escalate — repetition preserves relationship while holding limit (C-EXTB03_CH19-003).
      - Stop when boundary is clear — not when other person exhausted (σ− no nagging from operator side).
    cognitive_frame: Broken Record holds message under pressure — tolerating disapproval without over-giving (pillar P-K).
    observables:
      - Operator repeats boundary once or twice without argument spiral
      - Tone stays firm and pleasant
    contraindications:
      - Broken Record after clear yes from partner — not for negotiating consent
      - operator-side persistence-after-no (σ−)
    source_anchor: C-EXTB03_CH19-003 · braiker_2000_disease_to_please_ch19_chapter_ingest.md
    aletheia_wire: references/model/operator-self-module.md#please-loop
