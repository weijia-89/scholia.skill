    quality_level: full

  - exercise_name: DAY 4 — Sandwich Technique
    steps:
      - Open with genuine positive rapport element (Braiker DAY 4 Sandwich structure).
      - State direct refusal in middle — no without excessive justification (Braiker Ch21 key skill).
      - Close with positive relationship preservation element (Braiker Sandwich_Technique).
      - Practice for valued relationships — direct no while preserving rapport (C-EXTB03_CH21-001).
    cognitive_frame: Sandwich delivers no while preserving rapport — shame during awareness is expected; self-compassion over shame-as-fuel (P-L B03 ch11 wire).
    observables:
      - Refusal stated clearly in middle of exchange
      - Operator avoids over-apologizing or over-explaining
    contraindications:
      - sandwich so vague the no is missed
      - verbatim scripts pasted as messages (σ−)
    source_anchor: C-EXTB03_CH21-003 · braiker_2000_disease_to_please_ch21_chapter_ingest.md
    aletheia_wire: references/model/operator-self-module.md#please-loop
    operator_fit_tags: [dating-online, dating-IRL]
    quality_level: full

  - exercise_name: DAY 5 — Reverse Sandwich Technique
    steps:
      - Use Reverse Sandwich for counteroffers when pressured after initial no (Braiker DAY 5 C-EXTB03_CH22-001).
      - Expect resistance responses — prepare Broken Record follow-up, not capitulation (Braiker Ch22).
      - Repeat buy-time and no responses under pressure — skill builds with reps (C-EXTB03_CH21-003).
      - Label emotions in resistance without changing boundary (C-EXTB03_CH28-005 cross-link).
    cognitive_frame: Counteroffers need structure too — Reverse Sandwich is for negotiation, not reopening after clear no.
    observables:
      - Counteroffer stated once clearly
      - Operator holds boundary if pressure continues
    contraindications:
      - reverse sandwich to re-ask after she said no to date
      - overexplaining beyond Broken Record repetition (C-EXTB03_CH28-004)
