cards:
  - exercise_name: Broken Record Technique
    steps:
      - Acknowledge what the other person wants — without agreeing (Braiker DAY 2 Broken Record).
      - State your boundary message in clear, calm language (C-EXTB03_CH19-003).
      - Repeat the same message when pressured — do not add new justifications each round (Braiker Ch19).
      - Maintain firm pleasant tone — preserves relationship while holding limit (Braiker finding).
    cognitive_frame: Broken Record skeleton — hear what they want; my answer stays the same (pillar P-R practical).
    observables:
      - Boundary repeated without escalation or apology spiral
      - Operator exits warmly if pressure continues after clear no
    contraindications:
      - persistence-after-no from operator (σ−)
      - Broken Record to wear down explicit refusal from partner
    source_anchor: C-EXTB03_CH19-003 · braiker_2000_disease_to_please_ch19_chapter_ingest.md
