    quality_level: full

  - exercise_name: Boundary Porous vs Rigid Assessment
    steps:
      - Rate boundary style — porous (over-accommodate) vs rigid (block intimacy) (Hanks Ch8 Boundary assessment).
      - Wait until emotions reach wise mind before assertive time request (Hanks Ch8).
      - Practice saying no as fundamental act of differentiation (Hanks Ch8 finding).
      - Use I-feel/I-think stems for non-blaming feedback when boundary crossed (Hanks Ch8).
    cognitive_frame: Conflict exposure reduces conflict phobia — boundaries are skills reps not identity (Braiker ch15/35 pillar P-S).
    observables:
      - Operator declines unwanted request without over-apology
      - Maintains connection tone while holding no
    contraindications:
      - rigid boundary as punishment silence
      - porous boundary then ghosting instead of direct decline
