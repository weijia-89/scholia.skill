  - exercise_name: Doormat / Sword / Lantern Map
    steps:
      - Identify default stance under boundary pressure — Doormat, Sword, or Lantern (Hanks Ch7).
      - Doormat — note people-pleasing and fear of rejection driving yes (Hanks Ch7).
      - Sword — note sarcasm or protective aggression (Hanks Ch7).
      - Practice Lantern — direct boundary plus openness to her perspective (Hanks Lantern Stance Scenarios).
    cognitive_frame: Passive and aggressive styles rarely work — assertive is direct and clear, not sharp (Antony Ch10 wire in concept-and-tone).
    observables:
      - Operator names stance in debrief
      - Rewrites toward Lantern after HUMOR-AGGRESSIVE or MANIP-BOUNDPUSH WARN
    contraindications:
      - Sword as dominance flirt
      - Doormat yes followed by resentment leak
    source_anchor: C-EXTB02_CH02-004 · hanks_2016_assertiveness_women_ch02_chapter_ingest.md
