  - exercise_name: Partner Attachment Questionnaire
    steps:
      - Complete partner-focused questionnaire scoring groups A (avoidant), B (secure), C (anxious) (Levine Ch8 partner_attachment_questionnaire).
      - Score ≥23 on one group as provisional style indicator — pattern over single symptom (Golden Rule 3).
      - Apply Golden Rules — intimacy seeking, rejection sensitivity, reaction to effective communication, listen for omissions (Levine Ch8).
      - Revisit score after new behavioral data rather than locking label after day one.
    cognitive_frame: Questionnaire supports hypothesis testing about fit — not a verdict on chemistry or a script for pursuit.
    observables:
      - Operator cites multiple behavioral markers aligned with score group
      - Notes smoking-gun avoidant responses to needs disclosure without self-blame spiral
      - Secure matches given runway for direct communication
    contraindications:
      - using anxious label to justify double-text escalation
      - using avoidant label to perform distancing games
    source_anchor: C-B08_CH08-001 · levine_2010_attached_ch08_chapter_ingest.md
    aletheia_wire: references/model/operator-self-module.md#attach-read
    operator_fit_tags: [partner-read]
    quality_level: full

  - exercise_name: Partner Read Behavior Log
    steps:
      - After each date or sustained message thread, log three observable behaviors — no inference column yet (pillar partner_read).
      - Secure markers — consistent follow-through, direct asks, tolerates closeness and space (pillar partner_read).
      - Anxious markers — rapid merge, protest when distant, hypervigilance to cues (pillar partner_read + Levine Ch4).
      - Avoidant markers — warmth then withdrawal, self-reliance emphasis, distancing when serious (pillar partner_read + Levine Ch8 smoking guns).
    cognitive_frame: Read partners by accumulated behavior, not by fantasy or one spike of activation mistaken for chemistry.
    observables:
      - Written log with dates and behaviors before style hypothesis
      - Operator distinguishes protest spike from genuine mismatch before acting
    contraindications:
      - labeling from covert-interest heuristics alone
      - diagnostic certainty without 2–3 observation windows
