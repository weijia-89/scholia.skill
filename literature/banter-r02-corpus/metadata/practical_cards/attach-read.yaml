cards:
  - exercise_name: Applied Adult Attachment Style Spotting
    steps:
      - Shift question from "does she like me?" to "can this person meet my intimacy needs?" (Levine Ch4 investment frame).
      - Observe three behavioral episodes over 2–3 dates before labeling — not one signal (pillar operator_note + Levine methodology).
      - Map behaviors to secure, anxious, or avoidant prototypes using consistent follow-through, direct asks, and closeness/space tolerance (C-B08_CH04-001).
      - Record observations in a log — behavior first, label second — to reduce fusion with one ambiguous cue.
    cognitive_frame: Styles are useful supporing calibration, not destiny labels or excuses for protest behavior.
    observables:
      - Operator notes specific behaviors (response latency, follow-through, direct asks) before style label
      - Avoids labeling from a single text or one date
      - Distinguishes own activation from partner pattern
    contraindications:
      - mind-reading partner intent from attachment label
      - protest-behavior scripts or chase after avoidant withdrawal (σ−)
      - hard-to-get performance
    source_anchor: C-B08_CH04-001 · levine_2010_attached_ch04_chapter_ingest.md
