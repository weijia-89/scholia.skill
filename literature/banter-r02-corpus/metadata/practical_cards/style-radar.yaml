cards:
  - exercise_name: Five Flirting Styles Behavioral Checklist
    steps:
      - Note your primary style from FSI — physical, traditional, sincere, polite, or playful — labels not destiny (C-004-Hall).
      - Observe partner's style-linked behaviors in context — lab stranger setting may not generalize to bars/apps (P05 limitations).
      - Physical style — watch conversational fluency, touch/proximity, palming, orientation shifts when attracted (P05 physical profile).
      - Sincere style — deep conversation, eye contact, smiling/laughing clusters; less teasing late interaction (P05 sincere profile).
      - Playful style — teasing, humor, ambiguous banter; match or complement — mismatch is calibration data not rejection proof (pillar P-X).
    cognitive_frame: There is more than one way to flirt — style-aware routing beats generic signal scripts (Q-P05-004).
    observables:
      - Operator tracks behavior units not single magic signals
      - Adjusts warmth/directness when style mismatch noted
      - Separates affiliation displays from dominance-only performance
    contraindications:
      - treating lab-coded behaviors as universal bar-game script
      - physical-style fluency without warmth (P10 σ− NONVERBAL-DOMINANCE)
      - scripted mimicry of partner posture (NONVERBAL-MIMICRY WARN)
