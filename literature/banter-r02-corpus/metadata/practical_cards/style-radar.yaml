  - exercise_name: Style-to-Observable Behavior Map
    steps:
      - Traditional — note gender-moderated structured courtship cues; lean, pitch, palming patterns (P05 traditional profile).
      - Polite — reserved/distancing when attracted; lower pitch, fewer early questions; cautious contact (P05 polite profile).
      - Pool attraction main effects separately — compliments, flirtatious glances, reduced late teasing may co-occur across styles (P05 Table 7).
      - Log which observable clusters appeared — compare to your style defaults before changing approach.
    cognitive_frame: Behaviors associated with attraction vary by style — assume variety between individuals (Q-P05-001).
    observables:
      - Checklist completed after interaction with minute-window notes where possible
      - Operator avoids over-weighting one cue (e.g., teasing alone)
    contraindications:
      - inferring consent from flirt style behaviors
      - treating covert warmth as override for explicit refusal (C-021)
