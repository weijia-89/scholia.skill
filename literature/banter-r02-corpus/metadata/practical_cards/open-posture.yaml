cards:
  - exercise_name: Postural Expansiveness Behavioral Rubric
    steps:
      - Adopt open posture — widespread limbs, stretched torso, occupy space without crowding partner (P10 postural expansiveness construct).
      - Keep shoulders open and hands visible; reduce contractive closed posture (P10 expansive vs contractive contrast).
      - Orient torso toward partner; slow fidgeting — log comfort not "yes" rate (pillar P-AA + P10 σ−).
      - Separate affiliation displays (smiles, nods, laughs) from dominance-only performance — warmth required (P10 mediation note + NONVERBAL-DOMINANCE WARN).
      - Mirror energy naturally — do not script mimicry (NONVERBAL-MIMICRY WARN).
    cognitive_frame: Expansiveness signals to perceivers — not an internal power-pose intervention (P10 power_posing_boundary).
    observables:
      - Open shoulders and visible hands in seated conversation
      - Affiliative signals co-occur with expansiveness
      - Operator logs own comfort level post-interaction
    contraindications:
      - crowding partner space as dominance display
      - coaching outcome promises from OR 1.76 (non-load-bearing per pillar)
      - power pose without warmth
