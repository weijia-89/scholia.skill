  - exercise_name: Affiliation vs Dominance Cue Check
    steps:
      - Code your display — expansiveness present? affiliative smiles/nods present? (P10 study_1 joint effects).
      - Note perceiver pathway — dominance mediates attraction more than openness alone in photo study (P10 study_2b).
      - If only dominance cues without warmth — adjust toward affiliative displays (concept-and-tone NONVERBAL-DOMINANCE).
      - Debrief behavior rubric only — do not track match rate as success metric (pillar confidence 60 fragile replication).
    cognitive_frame: Open posture is behavioral affiliation signal — not a trick to increase yes-rate.
    observables:
      - Smiles/nods co-occur with open posture
      - No intentional intimidation positioning
    contraindications:
